<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        #addForm { display: flex; gap: 10px; margin-bottom: 20px; }
        #addForm input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        #addForm button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #addForm button:hover { background: #45a049; }
        ul { list-style: none; }
        li { background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; }
        li .todo-content { flex: 1; }
        li .delete-btn { padding: 8px 15px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
        li .delete-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <form id="addForm">
            <input type="text" id="todoInput" placeholder="Enter a new todo..." required>
            <button type="submit">Add</button>
        </form>
        <ul id="todoList"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
