<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        #addForm { display: flex; gap: 10px; margin-bottom: 20px; }
        #addForm input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        #addForm button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        #addForm button:hover { background: #45a049; }
        ul { list-style: none; }
        li { background: #fafafa; padding: 15px; margin-bottom: 10px; border-radius: 4px; border-left: 3px solid #4CAF50; display: flex; justify-content: space-between; align-items: center; }
        li .todo-content { flex: 1; }
        li .delete-btn { padding: 8px 15px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; }
        li .delete-btn:hover { background: #d32f2f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo App</h1>
        <form id="addForm" data-test-id="form-add">
            <input type="text" id="todoInput" placeholder="Enter a new todo..." required data-test-id="todo-input">
            <button type="submit" data-test-id="btn-add">Add</button>
        </form>
        <div id="filterContainer" style="margin-bottom: 15px;">
            <input type="text" id="filter" placeholder="Filter todos..." data-test-id="filter">
            <button id="filterBtnAll" style="padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;" data-test-id="filter-btn-all">All</button>
            <button id="filterBtnActive" style="padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;" data-test-id="filter-btn-active">Active</button>
            <button id="filterBtnComplete" style="padding: 8px 16px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;" data-test-id="filter-btn-complete">Complete</button>
        </div>
        <ul id="todoList" data-test-id="todo-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
