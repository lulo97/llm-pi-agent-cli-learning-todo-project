<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #todo-form input { display: block; width: 90%; margin-bottom: 10px; padding: 8px; }
        .todo-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .todo-item.completed { text-decoration: line-through; color: #888; }
        .actions button { margin-left: 5px; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>My ToDo List</h1>

    <form id="todo-form">
        <input type="text" data-test-id="todo-title" id="todo-title" placeholder="Task title" required>
        <input type="text" id="todo-description" placeholder="Description (optional)">
        <button type="submit">Add Todo</button>
    </form>

    <h2>Your Tasks</h2>
    <div id="todo-list">
        <!-- Todos will be rendered here -->
        <p>Loading todos...</p>
    </div>

    <script>
        const todoListEl = document.getElementById('todo-list');
        const todoForm = document.getElementById('todo-form');
        let todos = [];

        // --- API Utility Functions ---
        async function fetchTodos() {
            const response = await fetch('/todos');
            if (!response.ok) throw new Error('Failed to fetch todos');
            todos = await response.json();
            renderTodos();
        }

        async function addTodo(title, description) {
            const response = await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description })
            });
            if (!response.ok) throw new Error('Failed to add todo');
            const newTodo = await response.json();
            todos.push(newTodo);
            renderTodos();
        }

        async function updateTodo(id, updates) {
            const response = await fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(updates)
            });
            if (!response.ok) throw new Error('Failed to update todo');
            const updatedTodo = await response.json();
            const index = todos.findIndex(t => t.id === id);
            if (index !== -1) {
                todos[index] = updatedTodo;
            }
            renderTodos();
        }

        async function deleteTodo(id) {
            const response = await fetch(`/todos/${id}`, {
                method: 'DELETE',
            });
            if (!response.ok) throw new Error('Failed to delete todo');
            
            todos = todos.filter(t => t.id !== id);
            renderTodos();
        }

        // --- UI Rendering ---
        function renderTodos() {
            todoListEl.innerHTML = '';
            if (todos.length === 0) {
                todoListEl.innerHTML = '<p>No tasks yet! Add one above.</p>';
                return;
            }

            todos.forEach(todo => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                itemDiv.setAttribute('data-id', todo.id); // Placeholder for Task 4

                itemDiv.innerHTML = `
                    <div>
                        <strong>${todo.title}</strong> ${todo.description ? `(<small>${todo.description}</small>)` : ''}
                        <input type="checkbox" data-test-id="todo-checkbox-${todo.id}" data-action="toggle" data-id="${todo.id}">
                    </div>
                    <div class="actions">
                        <button data-action="update" data-id="${todo.id}">Update</button>
                        <button data-test-id="delete-todo" data-action="delete" data-id="${todo.id}">Delete</button>
                    </div>
                `;
                todoListEl.appendChild(itemDiv);
            });
        }

        // --- Event Listeners ---
        todoForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const titleInput = document.getElementById('todo-title');
            const descInput = document.getElementById('todo-description');
            
            try {
                await addTodo(titleInput.value, descInput.value);
                titleInput.value = '';
                descInput.value = '';
            } catch (error) {
                console.error("Error adding todo:", error);
                alert("Could not add todo. Check console for details.");
            }
        });

        todoListEl.addEventListener('click', async (e) => {
            const target = e.target;
            const id = parseInt(target.dataset.id);
            const action = target.dataset.action;

            if (!id || !action) return;

            try {
                if (action === 'toggle') {
                    const isCompleted = target.checked;
                    await updateTodo(id, { completed: isCompleted });
                } else if (action === 'update') {
                    const newTitle = prompt("Enter new title:");
                    const newDesc = prompt("Enter new description:");
                    await updateTodo(id, { title: newTitle, description: newDesc });
                } else if (action === 'delete') {
                    if (confirm("Are you sure you want to delete this task?")) {
                        await deleteTodo(id);
                    }
                }
            } catch (error) {
                console.error(`Error performing ${action}:`, error);
                alert(`Could not perform ${action}. Check console.`);
            }
        });

        // Initialize application
        fetchTodos();
    </script>
</body>
</html>
